<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 180 Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-blue-400">🚀 Project 180: Mission Control</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div class="bg-gray-800 p-6 rounded-lg border border-gray-700">
                <h2 class="text-gray-400 uppercase text-sm font-bold">Total Project Fund</h2>
                <p class="text-4xl font-mono text-green-400">₹15,000</p>
            </div>
            <div class="bg-gray-800 p-6 rounded-lg border border-gray-700">
                <h2 class="text-gray-400 uppercase text-sm font-bold">Remaining Balance</h2>
                <p class="text-4xl font-mono text-yellow-400">₹8,400</p>
            </div>
        </div>

        <div class="bg-gray-800 rounded-lg overflow-hidden border border-gray-700">
            <table class="w-full text-left">
                <thead class="bg-gray-700 text-gray-300 uppercase text-xs">
                    <tr>
                        <th class="p-4">Member</th>
                        <th class="p-4">Task</th>
                        <th class="p-4">Allocated Budget</th>
                        <th class="p-4">Status</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-700">
                    <tr>
                        <td class="p-4 font-bold">Pradumn</td>
                        <td class="p-4">Wiring & Power Mgmt</td>
                        <td class="p-4 text-blue-300">₹3,200</td>
                        <td class="p-4"><span class="bg-green-900 text-green-300 px-2 py-1 rounded text-xs">In Progress</span></td>
                    </tr>
                    <tr>
                        <td class="p-4 font-bold">Sarthak (You)</td>
                        <td class="p-4">RAG & API Integration</td>
                        <td class="p-4 text-blue-300">₹2,000</td>
                        <td class="p-4"><span class="bg-blue-900 text-blue-300 px-2 py-1 rounded text-xs">Planning</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
